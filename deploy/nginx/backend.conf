# Shared nginx config for remote server
# This file handles both dojo-tracker and dojo-games domains

# Dojo Tracker
server {
    listen [::]:80;
    listen 80;
    server_name dojo-tracker.japan-dojo.com;

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    server_name dojo-tracker.japan-dojo.com;

    ssl_certificate /etc/letsencrypt/live/dojo-tracker.japan-dojo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dojo-tracker.japan-dojo.com/privkey.pem;

    client_max_body_size 1M;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://dojo-tracker-app:3000;
    }
}

# Dojo Games
server {
    listen [::]:80;
    listen 80;
    server_name games.japan-dojo.com;

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    server_name games.japan-dojo.com;

    ssl_certificate /etc/letsencrypt/live/games.japan-dojo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/games.japan-dojo.com/privkey.pem;

    client_max_body_size 10M;

    # API requests go to backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://dojo-games-backend:5001;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://dojo-games-backend:5001/check-auth;
    }
}
